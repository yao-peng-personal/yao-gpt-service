# nginx reverse proxy with DDoS protection layers
#
# Place at: /etc/nginx/sites-available/yao-gpt
# Enable:    sudo ln -s /etc/nginx/sites-available/yao-gpt /etc/nginx/sites-enabled/
# Verify:    sudo nginx -t && sudo systemctl reload nginx

# ---- Rate limiting zones ------------------------------------------------
# $binary_remote_addr keeps an IP hash (4 bytes) — memory efficient
limit_req_zone  $binary_remote_addr  zone=req_per_ip:10m   rate=10r/s;
limit_conn_zone $binary_remote_addr  zone=conn_per_ip:10m;

# ---- Upstream definitions -----------------------------------------------
upstream streamlit {
    server 127.0.0.1:8501;
    keepalive 32;
}

upstream fastapi {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ---- HTTP server --------------------------------------------------------
server {
    listen 8080;
    server_name _;

    # ---- DDoS / abuse protections ------------------------------------------
    # Hard cap on concurrent connections per IP
    limit_conn conn_per_ip 10;

    # Rate limiting — return 429 when exceeded
    limit_req zone=req_per_ip burst=20 nodelay;

    # Reject excessively large requests / headers
    client_max_body_size 1m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 8k;

    # Slowloris mitigation
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Hide nginx version from error pages
    server_tokens off;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"            always;
    add_header X-Content-Type-Options    "nosniff"               always;
    add_header X-XSS-Protection          "1; mode=block"         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ---- Streamlit UI -------------------------------------------------------
    location / {
        proxy_pass http://streamlit;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_buffering off;  # Required for Streamlit’s SSE / WebSocket
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ---- FastAPI backend ----------------------------------------------------
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://fastapi;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
